name: finder
description: FindER - Real-Time Emergency Response Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.1
  dio: ^5.4.0
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  geolocator: ^10.1.0
  google_maps_flutter: ^2.5.3
  intl: ^0.18.1
  uuid: ^4.2.2
  flutter_animate: ^4.2.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
  animations: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
